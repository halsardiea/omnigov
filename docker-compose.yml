# ==========================================================
# OmniGov — PRODUCTION Docker Compose
# Runs ALL services: Nginx, Django, Celery, PostgreSQL,
#                     Redis, GVM/OpenVAS
# ==========================================================

services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
    depends_on:
      - web
    restart: always
    networks:
      - omnigov-net

  web:
    build: .
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 omnigov.asgi:application"
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=omnigov.settings.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always
    networks:
      - omnigov-net

  celery-worker:
    build: .
    command: celery -A omnigov worker -l info --concurrency=3
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=omnigov.settings.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always
    networks:
      - omnigov-net

  celery-beat:
    build: .
    command: celery -A omnigov beat -l info --scheduler django_celery_results.schedulers:DatabaseScheduler
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=omnigov.settings.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always
    networks:
      - omnigov-net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-omnigov}
      POSTGRES_USER: ${DB_USER:-omnigov}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-omnigov}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - omnigov-net

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - omnigov-net

  gvm:
    image: immauss/openvas:latest
    environment:
      - PASSWORD=${GVM_ADMIN_PASSWORD:-admin}
    ports:
      - "9392:9392"
    volumes:
      - gvm_data:/data
    restart: always
    networks:
      - omnigov-net

volumes:
  postgres_data:
  gvm_data:
  static_files:
  media_files:

networks:
  omnigov-net:
    driver: bridge
